services:
  - type: web
    name: n8n-news-digest
    env: docker
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: N8N_PORT
        value: 10000
      - key: N8N_ENCRYPTION_KEY
        generateValue: true # Render will automatically generate a secure random key for you
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        sync: false
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        sync: false
      - key: DB_POSTGRESDB_USER
        sync: false
      - key: DB_POSTGRESDB_PASSWORD
        sync: false
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: WEBHOOK_URL
        fromService:
          name: n8n-news-digest
          type: web
          envVarKey: RENDER_EXTERNAL_URL # Render automatically maps its autogenerated external URL here
      - key: N8N_SECURE_COOKIE
        value: "false"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=360"
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "24"
      - key: DB_POSTGRESDB_CONNECTION_TIMEOUT
        value: "30000"
      - key: DB_PING_TIMEOUT_MS
        value: "20000"
